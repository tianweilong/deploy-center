name: 校验部署配置

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: 校验部署 YAML
        run: ruby -e "require 'yaml'; Dir['**/*.yaml'].each { |f| YAML.load_file(f); puts f }"
      - name: 校验辅助脚本
        run: bash -n scripts/update-deployment-state.sh
