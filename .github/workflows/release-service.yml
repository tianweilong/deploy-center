name: 发布服务

on:
  repository_dispatch:
    types:
      - deploy-center-release
  workflow_dispatch:
    inputs:
      source_repository:
        description: 源仓库
        required: true
        type: string
      source_ref:
        description: 源引用
        required: true
        type: string
      source_sha:
        description: 源提交 SHA
        required: true
        type: string
      source_tag:
        description: 源标签
        required: true
        type: string
      services:
        description: 逗号分隔的服务列表
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  SOURCE_REPOSITORY: ${{ github.event.client_payload.source_repository || inputs.source_repository }}
  SOURCE_REF: ${{ github.event.client_payload.source_ref || inputs.source_ref }}
  SOURCE_SHA: ${{ github.event.client_payload.source_sha || inputs.source_sha }}
  SOURCE_TAG: ${{ github.event.client_payload.source_tag || inputs.source_tag }}
  TARGET_SERVICES: ${{ github.event.client_payload.services || inputs.services }}
  DEFAULT_IMAGE_PLATFORMS: linux/amd64,linux/arm64

jobs:
  prepare:
    runs-on: ubuntu-latest
    env:
      VIBE_KANBAN_REMOTE_VITE_RELAY_API_BASE_URL: ${{ vars.VIBE_KANBAN_REMOTE_VITE_RELAY_API_BASE_URL }}
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: 校验发布输入
        run: |
          set -euo pipefail
          if [ -z "${SOURCE_REPOSITORY}" ] || [ -z "${SOURCE_REF}" ] || [ -z "${SOURCE_SHA}" ] || [ -z "${SOURCE_TAG}" ] || [ -z "${TARGET_SERVICES}" ]; then
            echo '缺少必填发布输入。' >&2
            exit 1
          fi

      - id: matrix
        name: 构建服务矩阵
        run: |
          set -euo pipefail
          matrix=$(TARGET_SERVICES="${TARGET_SERVICES}" \
            SOURCE_TAG="${SOURCE_TAG}" \
            VIBE_KANBAN_REMOTE_VITE_RELAY_API_BASE_URL="${VIBE_KANBAN_REMOTE_VITE_RELAY_API_BASE_URL:-}" \
            ruby scripts/prepare-release-matrix.rb config/services.vibe-kanban.json)
          {
            echo 'matrix<<EOF'
            echo "$matrix"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: [self-hosted, Linux, ARM64]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: 检出源仓库
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          ref: ${{ env.SOURCE_SHA }}
          path: source
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          fetch-depth: 0

      - id: image-tags
        name: 生成镜像标签
        working-directory: source
        env:
          IMAGE_REPOSITORY: ${{ matrix.image_repository }}
        run: |
          set -euo pipefail
          latest_tag=$(git tag --list | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)
          tags="${IMAGE_REPOSITORY}:${SOURCE_TAG}"

          if [ -n "${latest_tag}" ] && [ "${latest_tag}" = "${SOURCE_TAG}" ]; then
            tags="${tags}"$'\n'"${IMAGE_REPOSITORY}:latest"
          fi

          {
            echo 'tags<<EOF'
            printf '%s\n' "$tags"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: 配置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
          build-args: ${{ join(matrix.build_args, '\n') }}

  update-state:
    needs:
      - prepare
      - build
    if: ${{ needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: 更新部署状态并提交
        env:
          RELEASE_MATRIX: ${{ needs.prepare.outputs.matrix }}
        run: |
          set -euo pipefail
          ./scripts/commit-deployment-state-with-retry.sh
